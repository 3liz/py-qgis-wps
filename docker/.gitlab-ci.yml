
variables:
    FACTORY_MANIFEST: "docker/factory.manifest"

.only_refs: &only_refs
  refs:
    - tags
    - master

#-------------
# Build
#-------------

.build-docker:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: docker
  script:
    - make version
    - make -C docker build deliver pushrc clean FLAVOR=$QGIS_FLAVOR
  environment:
    name: snap
  artifacts:
    paths:
      - "docker/factory-${QGIS_FLAVOR}.manifest"
  only:
    <<: *only_refs 
  tags:
    - factory-dind

build-docker:3.44:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.44"

build-docker:3.40:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.40"

build-docker:3.34:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.34"

#-------------
# deploy
#-------------

deploy:snap:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: deploy
  script:
    - update-service wps
  allow_failure: true
  environment:
    name: snap
  only:
    <<: *only_refs
  tags:
    - factory-plain

#-------------
# Release
#-------------

.release:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: release
  script:
    - release-image qgis-wps-server-$QGIS_FLAVOR
    - push-to-docker-hub --clean
  environment:
    name: production
  when: manual
  allow_failure: false
  only:
    refs:
      - tags
  tags:
    - factory-dind
  variables:
    FACTORY_MANIFEST: "docker/factory-${QGIS_FLAVOR}.manifest"

release:3.44:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.44"
  dependencies:
    - build-docker:3.44

release:3.40:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.40"
  dependencies:
    - build-docker:3.40

release:3.34:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.34"
  dependencies:
    - build-docker:3.34

